<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05-01</title>
</head>
<body>
    <h1>Lab5</h1>
    <div id="get_result">
        
    </div>
    <button onclick="GET()">GET</button>

    <div>
        <label for="ID">ID</label>
        <input type="number" id = "ID" min="0">
        </br>

        <label for="FIO">FIO</label>
        <input type="text" id = "FIO">
        </br>

        <label for="BDay">BDay</label>
        <input type="date" id = "BDay">
        </br>

        <button onclick="Post()">Insert</button>
        <button onclick="Update()">Update</button>
        <button onclick="Delete()">Delete</button>
    </div>
<script>
 function GET(){
            console.log('GET');
            fetch('http://localhost:5000/api/db',
                {
                method: 'GET',
                mode: 'no-cors',
                headers:{'Content-Type':'application/json', 'Accept':'application/json'}
                }
            )
            .then(response => {
                return response.json();
            })
            .then((pdata)=> {
                console.log('pdata', pdata);
                get_result.innerHTML =' ';
                pdata.forEach(el => 
                    get_result.innerHTML += (
                    el.ID + ' ' + 
                    el.FIO + ' ' +
                    el.BDay + '</br>'));
            })
        }
        function Post(){
            console.log('POST');
            fetch('http://localhost:5000/api/db',{
                method: 'POST',
                mode: 'no-cors',
                headers:{'Content-Type':'application/json', 'Accept':'application/json'},
                body: JSON.stringify({ID:ID.value, FIO: FIO.value, BDay: BDay.value})
            }
            )
            .then(response => {return response.json();})
            .then((pdata)=> {console.log('POST.pdata', pdata);})
        }
        function Update() {
            console.log('PUT');
            fetch('http://localhost:5000/api/db', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ ID: ID.value, FIO: FIO.value, BDay: BDay.value })
            })
            .then(response => { return response.json(); })
            .then((pdata) => { console.log('PUT.pdata', pdata); })
        }
        function Delete() {
            console.log('DELETE');
            fetch(`http://localhost:5000/api/db?id=${ID.value}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ ID: ID.value, FIO: FIO.value, BDay: BDay.value })
            })
                .then(response => { return response.json(); })
                .then((pdata) => { console.log('DELETE.pdata', pdata); })
        }
</script>
</body>
</html>
