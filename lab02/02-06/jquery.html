<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Ajax Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>jQuery Ajax Demo</h1>
        <p>Нажмите кнопку для получения данных с сервера:</p>
        <button id="loadDataBtn">Получить данные</button>
        <div id="result"></div>
    </div>

    <script>
        $(document).ready(function() {
            $('#loadDataBtn').click(function() {
                $.ajax({
                    url: 'http://localhost:5000/api/name',
                    method: 'GET',
                    success: function(data) {
                        $('#result').html('Полученные данные: ' + data);
                    },
                    error: function(xhr, status, error) {
                        $('#result').html('Ошибка: ' + status + ' - ' + error);
                    }
                });
            });
        });
    </script>
</body>
</html>
